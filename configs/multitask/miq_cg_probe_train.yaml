# Training config for the constraint-generation probe (see miq_cg_probe.yaml).
#
# Three levers vs the failed cg run:
#   1. Exploration: num_generations 16 + temperature 1.1 so the policy samples
#      varied molecules and discovers ones close to the target instead of
#      collapsing to a single safe molecule.
#   2. Reward rebalance: shaped (property-closeness) weight up to 1.5 and the
#      flat valid-SMILES bonus down to 0.25, so "any valid molecule" is no
#      longer a comfortable local optimum -- hitting the target count pays much
#      more than just being parseable.
#   3. Warm start from the counts model (good format + number sense, no benzene
#      collapse) rather than the collapsed generation model.
task_name: moleculariq
model_name: outputs/miq-curriculum-01-counts
dataset_path: data/miq_cg_probe_train
output_dir: outputs/miq-cg-probe

moleculariq_task_type: constraint_generation

learning_rate: 1.0e-5
beta: 0.005

num_generations: 16                 # more samples per prompt -> better exploration
temperature: 1.1                    # higher sampling temperature -> escape mode collapse
per_device_train_batch_size: 32     # (bsz * grad_accum) must be divisible by num_generations
gradient_accumulation_steps: 1

max_prompt_length: 384
max_completion_length: 256          # cg answers are short (reasoning + one SMILES)
num_train_epochs: 1
max_steps: 3000
warmup_ratio: 0.1
weight_decay: 0.1
max_grad_norm: 0.1
lr_scheduler_type: cosine

seed: 47
logging_steps: 1
save_steps: 500
bf16: true
gradient_checkpointing: true
optim: adamw_torch

use_soft_format_reward: true
correctness_weight: 2.0
use_shaped_moleculariq_reward: true
shaped_moleculariq_weight: 1.5      # property-closeness dominates
smiles_validity_weight: 0.25        # de-emphasise the "safe valid molecule" floor
resume_from_checkpoint:
save_on_interrupt: true
