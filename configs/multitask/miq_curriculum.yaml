base_train_config: configs/multitask/miq_multitask_balanced_train.yaml
base_model: Qwen/Qwen2.5-0.5B-Instruct
overwrite_datasets: false

stages:
  - name: 01_counts
    dataset:
      out_dir: data/miq_curriculum_01_counts_train
      strategy: balanced
      split: train
      seed: 42
      shuffle: true
      samples_per_task: 1500
      tasks:
        - task_id: sc_ring_count
          task_type: single_count
          properties: [ring_count]
          num_samples: 1500
        - task_id: sc_aromatic_ring
          task_type: single_count
          properties: [aromatic_ring_count]
          num_samples: 1500
        - task_id: sc_fused_ring
          task_type: single_count
          properties: [fused_ring_count]
          num_samples: 1500
        - task_id: sc_carbon_atom
          task_type: single_count
          properties: [carbon_atom_count]
          num_samples: 1500
        - task_id: sc_hetero_atom
          task_type: single_count
          properties: [hetero_atom_count]
          num_samples: 1500
        - task_id: sc_hba
          task_type: single_count
          properties: [hba_count]
          num_samples: 1500
        - task_id: sc_rotatable_bond
          task_type: single_count
          properties: [rotatable_bond_count]
          num_samples: 1500
        - task_id: mc_topology
          task_type: multi_count
          properties: [ring_count, aromatic_ring_count, fused_ring_count]
          num_samples: 1500
        - task_id: mc_composition
          task_type: multi_count
          properties: [carbon_atom_count, hetero_atom_count, halogen_atom_count]
          num_samples: 1500
    train:
      output_dir: outputs/miq-curriculum-01-counts
      max_steps: 2500
      save_steps: 500
      # 8 (not the default 4) for lower-variance GRPO advantage estimates on the
      # foundational counting stage; batch (bsz*accum) stays divisible by it.
      num_generations: 8

  - name: 02_simple_index
    dataset:
      out_dir: data/miq_curriculum_02_simple_index_train
      strategy: pooled
      split: train
      seed: 43
      shuffle: true
      tasks:
        # Replay every count family learned in stage 1 so it is not forgotten
        # while the model picks up index tasks.
        - task_id: sc_ring_count_replay
          task_type: single_count
          properties: [ring_count]
          num_samples: 250
        - task_id: sc_aromatic_ring_replay
          task_type: single_count
          properties: [aromatic_ring_count]
          num_samples: 250
        - task_id: sc_fused_ring_replay
          task_type: single_count
          properties: [fused_ring_count]
          num_samples: 250
        - task_id: sc_carbon_atom_replay
          task_type: single_count
          properties: [carbon_atom_count]
          num_samples: 250
        - task_id: sc_hetero_atom_replay
          task_type: single_count
          properties: [hetero_atom_count]
          num_samples: 250
        - task_id: sc_hba_replay
          task_type: single_count
          properties: [hba_count]
          num_samples: 250
        - task_id: sc_rotatable_bond_replay
          task_type: single_count
          properties: [rotatable_bond_count]
          num_samples: 250
        - task_id: mc_topology_replay
          task_type: multi_count
          properties: [ring_count, aromatic_ring_count, fused_ring_count]
          num_samples: 250
        - task_id: mc_composition_replay
          task_type: multi_count
          properties: [carbon_atom_count, hetero_atom_count, halogen_atom_count]
          num_samples: 250
        - task_id: si_ring
          task_type: single_index
          properties: [ring_index]
          num_samples: 1500
          candidate_multiplier: 6
          filters:
            max_smiles_length: 60
            max_answer_list_length: 6
        - task_id: si_ring_nonempty
          task_type: single_index
          properties: [ring_index]
          num_samples: 600
          candidate_multiplier: 12
          filters:
            max_smiles_length: 60
            max_answer_list_length: 6
            require_nonempty_list: true
        - task_id: si_aromatic_ring
          task_type: single_index
          properties: [aromatic_ring_index]
          num_samples: 1500
          candidate_multiplier: 6
          filters:
            max_smiles_length: 60
            max_answer_list_length: 6
        - task_id: si_aromatic_ring_nonempty
          task_type: single_index
          properties: [aromatic_ring_index]
          num_samples: 600
          candidate_multiplier: 12
          filters:
            max_smiles_length: 60
            max_answer_list_length: 6
            require_nonempty_list: true
        - task_id: si_carbon_atom
          task_type: single_index
          properties: [carbon_atom_index]
          num_samples: 1500
          candidate_multiplier: 8
          filters:
            max_smiles_length: 45
            max_answer_list_length: 8
        - task_id: si_hetero_atom
          task_type: single_index
          properties: [hetero_atom_index]
          num_samples: 1500
          candidate_multiplier: 6
          filters:
            max_smiles_length: 60
            max_answer_list_length: 6
        - task_id: si_hetero_atom_nonempty
          task_type: single_index
          properties: [hetero_atom_index]
          num_samples: 600
          candidate_multiplier: 12
          filters:
            max_smiles_length: 60
            max_answer_list_length: 6
            require_nonempty_list: true
    train:
      output_dir: outputs/miq-curriculum-02-simple-index
      max_steps: 3000
      save_steps: 500
      num_generations: 8
      correctness_weight: 4.0
      shaped_moleculariq_weight: 0.75

  - name: 03_full_index
    dataset:
      out_dir: data/miq_curriculum_03_full_index_train
      strategy: pooled
      split: train
      seed: 44
      shuffle: true
      tasks:
        # Replay counts and the single-index tasks from earlier stages.
        - task_id: sc_ring_count_replay
          task_type: single_count
          properties: [ring_count]
          num_samples: 250
        - task_id: sc_aromatic_ring_replay
          task_type: single_count
          properties: [aromatic_ring_count]
          num_samples: 250
        - task_id: sc_fused_ring_replay
          task_type: single_count
          properties: [fused_ring_count]
          num_samples: 250
        - task_id: sc_carbon_atom_replay
          task_type: single_count
          properties: [carbon_atom_count]
          num_samples: 250
        - task_id: sc_hetero_atom_replay
          task_type: single_count
          properties: [hetero_atom_count]
          num_samples: 250
        - task_id: sc_hba_replay
          task_type: single_count
          properties: [hba_count]
          num_samples: 250
        - task_id: sc_rotatable_bond_replay
          task_type: single_count
          properties: [rotatable_bond_count]
          num_samples: 250
        - task_id: mc_topology_replay
          task_type: multi_count
          properties: [ring_count, aromatic_ring_count, fused_ring_count]
          num_samples: 250
        - task_id: mc_composition_replay
          task_type: multi_count
          properties: [carbon_atom_count, hetero_atom_count, halogen_atom_count]
          num_samples: 250
        # Index tasks share the eval-time tractability filters so training and
        # evaluation see the same distribution.
        - task_id: si_ring
          task_type: single_index
          properties: [ring_index]
          num_samples: 1500
          candidate_multiplier: 6
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
        - task_id: si_ring_nonempty
          task_type: single_index
          properties: [ring_index]
          num_samples: 700
          candidate_multiplier: 12
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
            require_nonempty_list: true
        - task_id: si_aromatic_ring
          task_type: single_index
          properties: [aromatic_ring_index]
          num_samples: 1500
          candidate_multiplier: 6
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
        - task_id: si_aromatic_ring_nonempty
          task_type: single_index
          properties: [aromatic_ring_index]
          num_samples: 700
          candidate_multiplier: 12
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
            require_nonempty_list: true
        - task_id: si_carbon_atom
          task_type: single_index
          properties: [carbon_atom_index]
          num_samples: 1500
          candidate_multiplier: 8
          filters:
            max_smiles_length: 70
            max_answer_list_length: 18
        - task_id: si_hetero_atom
          task_type: single_index
          properties: [hetero_atom_index]
          num_samples: 1500
          candidate_multiplier: 6
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
        - task_id: si_hetero_atom_nonempty
          task_type: single_index
          properties: [hetero_atom_index]
          num_samples: 700
          candidate_multiplier: 12
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
            require_nonempty_list: true
        - task_id: mi_ring_aromatic
          task_type: multi_index
          properties: [ring_index, aromatic_ring_index]
          num_samples: 1500
          candidate_multiplier: 6
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
        - task_id: mi_ring_aromatic_nonempty
          task_type: multi_index
          properties: [ring_index, aromatic_ring_index]
          num_samples: 800
          candidate_multiplier: 12
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
            min_answer_list_length: 1
    train:
      output_dir: outputs/miq-curriculum-03-full-index
      max_steps: 3000
      save_steps: 500
      num_generations: 8
      correctness_weight: 4.0
      shaped_moleculariq_weight: 0.75

  - name: 04_generation
    dataset:
      out_dir: data/miq_curriculum_04_generation_train
      strategy: pooled
      split: train
      seed: 45
      shuffle: true
      tasks:
        # Replay count and index families so the generation stage does not erase
        # the skills learned in stages 1-3.
        - task_id: sc_ring_count_replay
          task_type: single_count
          properties: [ring_count]
          num_samples: 300
        - task_id: sc_aromatic_ring_replay
          task_type: single_count
          properties: [aromatic_ring_count]
          num_samples: 300
        - task_id: sc_fused_ring_replay
          task_type: single_count
          properties: [fused_ring_count]
          num_samples: 300
        - task_id: sc_carbon_atom_replay
          task_type: single_count
          properties: [carbon_atom_count]
          num_samples: 300
        - task_id: sc_hetero_atom_replay
          task_type: single_count
          properties: [hetero_atom_count]
          num_samples: 300
        - task_id: sc_hba_replay
          task_type: single_count
          properties: [hba_count]
          num_samples: 300
        - task_id: sc_rotatable_bond_replay
          task_type: single_count
          properties: [rotatable_bond_count]
          num_samples: 300
        - task_id: mc_topology_replay
          task_type: multi_count
          properties: [ring_count, aromatic_ring_count, fused_ring_count]
          num_samples: 300
        - task_id: mc_composition_replay
          task_type: multi_count
          properties: [carbon_atom_count, hetero_atom_count, halogen_atom_count]
          num_samples: 300
        - task_id: si_ring_replay
          task_type: single_index
          properties: [ring_index]
          num_samples: 800
          candidate_multiplier: 6
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
        - task_id: si_ring_nonempty_replay
          task_type: single_index
          properties: [ring_index]
          num_samples: 400
          candidate_multiplier: 12
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
            require_nonempty_list: true
        - task_id: si_aromatic_ring_replay
          task_type: single_index
          properties: [aromatic_ring_index]
          num_samples: 800
          candidate_multiplier: 6
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
        - task_id: si_aromatic_ring_nonempty_replay
          task_type: single_index
          properties: [aromatic_ring_index]
          num_samples: 400
          candidate_multiplier: 12
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
            require_nonempty_list: true
        - task_id: si_carbon_atom_replay
          task_type: single_index
          properties: [carbon_atom_index]
          num_samples: 800
          candidate_multiplier: 8
          filters:
            max_smiles_length: 70
            max_answer_list_length: 18
        - task_id: si_hetero_atom_replay
          task_type: single_index
          properties: [hetero_atom_index]
          num_samples: 800
          candidate_multiplier: 6
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
        - task_id: si_hetero_atom_nonempty_replay
          task_type: single_index
          properties: [hetero_atom_index]
          num_samples: 400
          candidate_multiplier: 12
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
            require_nonempty_list: true
        - task_id: mi_ring_aromatic_replay
          task_type: multi_index
          properties: [ring_index, aromatic_ring_index]
          num_samples: 800
          candidate_multiplier: 6
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
        - task_id: mi_ring_aromatic_nonempty_replay
          task_type: multi_index
          properties: [ring_index, aromatic_ring_index]
          num_samples: 500
          candidate_multiplier: 12
          filters:
            max_smiles_length: 90
            max_answer_list_length: 10
            min_answer_list_length: 1
        - task_id: cg_ring_count
          task_type: constraint_generation
          properties: [ring_count]
          num_samples: 1500
          candidate_multiplier: 4
          filters:
            max_answer_numeric_value: 3
        - task_id: cg_carbon_atom
          task_type: constraint_generation
          properties: [carbon_atom_count]
          num_samples: 1500
          candidate_multiplier: 4
          filters:
            max_answer_numeric_value: 12
    train:
      output_dir: outputs/miq-curriculum-04-generation
      max_steps: 2500
      save_steps: 500
      # Constraint generation collapses to one safe molecule (benzene) unless the
      # policy explores and the reward rewards hitting the target over merely
      # being valid. More generations + higher temperature break the collapse;
      # property-closeness is weighted above the flat valid-SMILES floor.
      num_generations: 16
      temperature: 1.1
      correctness_weight: 4.0
      shaped_moleculariq_weight: 1.0
      smiles_validity_weight: 0.05
      smiles_nontrivial_weight: 0.1
