task_name: moleculariq
model_name: outputs/miq-curriculum-02-simple-index
dataset_path: data/miq_curriculum_03_full_index_train
output_dir: outputs/miq-curriculum-03-full-index

moleculariq_task_type: single_index

learning_rate: 1.0e-5
beta: 0.005
num_generations: 8
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
max_prompt_length: 512
max_completion_length: 384
num_train_epochs: 1
max_steps: 3000
warmup_ratio: 0.1
weight_decay: 0.1
max_grad_norm: 0.1
lr_scheduler_type: cosine

seed: 44
logging_steps: 1
save_steps: 500
bf16: true
gradient_checkpointing: true
optim: adamw_torch

use_soft_format_reward: true
# Reward the actual indexing algorithm: a complete SMILES atom map consistent
# with the returned index lists.
use_reasoning_quality_reward: false
use_index_reasoning_reward: true
index_reasoning_weight: 0.5
correctness_weight: 4.0
use_shaped_moleculariq_reward: true
shaped_moleculariq_weight: 0.75
smiles_validity_weight: 0.5
resume_from_checkpoint:
save_on_interrupt: true
