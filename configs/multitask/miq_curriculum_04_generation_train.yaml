task_name: moleculariq
model_name: outputs/miq-curriculum-03-full-index
dataset_path: data/miq_curriculum_04_generation_train
output_dir: outputs/miq-curriculum-04-generation

moleculariq_task_type: constraint_generation

learning_rate: 1.0e-5
beta: 0.005
# Exploration matters for generation: constraint generation collapses to one
# safe molecule (benzene) unless the policy samples varied candidates and the
# reward favours hitting the target over merely being valid. num_generations
# must divide (per_device_train_batch_size * gradient_accumulation_steps).
num_generations: 16
temperature: 1.1
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
max_prompt_length: 512
max_completion_length: 384
num_train_epochs: 1
max_steps: 2500
warmup_ratio: 0.1
weight_decay: 0.1
max_grad_norm: 0.1
lr_scheduler_type: cosine

seed: 45
logging_steps: 1
save_steps: 500
bf16: true
gradient_checkpointing: true
optim: adamw_torch

use_soft_format_reward: true
# Preserve molecule-specific atom mapping on replayed index examples.
use_reasoning_quality_reward: false
use_index_reasoning_reward: true
index_reasoning_weight: 0.5
correctness_weight: 4.0
use_shaped_moleculariq_reward: true
shaped_moleculariq_weight: 1.0
smiles_validity_weight: 0.05        # keep validity as a gate, not the objective
smiles_nontrivial_weight: 0.1       # mild pressure away from repeated alkanes
resume_from_checkpoint:
save_on_interrupt: true
