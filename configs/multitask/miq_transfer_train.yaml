# GRPO training config for the transfer/generalization study.
#
# Warm-starts directly from the instruct base (no SFT, no counts-pretrain) to
# keep the critical path short: base + this one run is enough for the headline
# H1 x H4 result. Mixed dataset -> rewards dispatch per row via the task_type
# column, so a single run covers count + index tasks.
task_name: moleculariq
model_name: Qwen/Qwen2.5-0.5B-Instruct
dataset_path: data/miq_transfer_train
output_dir: outputs/miq-transfer-grpo

# Used only for legacy single-task datasets; the mixed dataset dispatches per row.
moleculariq_task_type: single_count

learning_rate: 1.0e-5
beta: 0.005
num_generations: 4
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
max_prompt_length: 384
max_completion_length: 384
num_train_epochs: 1
max_steps: -1
warmup_ratio: 0.1
weight_decay: 0.1
max_grad_norm: 0.1
lr_scheduler_type: cosine

seed: 42
logging_steps: 1
save_steps: 250
bf16: true
gradient_checkpointing: true
optim: adamw_torch

# Shaped (dense) reward keeps GRPO advantages non-zero on the 0.5B model.
use_soft_format_reward: true
correctness_weight: 2.0
use_shaped_moleculariq_reward: true
shaped_moleculariq_weight: 1.0
smiles_validity_weight: 0.5
resume_from_checkpoint:
save_on_interrupt: true
