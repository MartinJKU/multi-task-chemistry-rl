# OPTIONAL H2 control: format-only reward (no verifiable correctness signal).
#
# Identical to miq_transfer_train.yaml except the correctness and shaped rewards
# are zeroed, so the model is optimized purely for output format. Comparing
# base -> this -> the verifier-reward model isolates how much of the gain comes
# from the *verifiable* reward rather than from more on-policy training / format
# pressure alone.
task_name: moleculariq
model_name: Qwen/Qwen2.5-0.5B-Instruct
dataset_path: data/miq_transfer_train
output_dir: outputs/miq-transfer-grpo-format

moleculariq_task_type: single_count

learning_rate: 1.0e-5
beta: 0.005
num_generations: 4
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
max_prompt_length: 384
max_completion_length: 384
num_train_epochs: 1
max_steps: -1
warmup_ratio: 0.1
weight_decay: 0.1
max_grad_norm: 0.1
lr_scheduler_type: cosine

seed: 42
logging_steps: 1
save_steps: 250
bf16: true
gradient_checkpointing: true
optim: adamw_torch

# Format-only: keep the format rewards, zero out correctness + shaping.
use_soft_format_reward: true
correctness_weight: 0.0
use_shaped_moleculariq_reward: false
shaped_moleculariq_weight: 0.0
smiles_validity_weight: 0.0
resume_from_checkpoint:
save_on_interrupt: true
