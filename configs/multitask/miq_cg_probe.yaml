# Constraint-generation probe: can the 0.5B model learn cg at all?
#
# Hypothesis: cg failed because targets were the exact (often large) property
# value of a random pool molecule, so "generate a molecule with exactly N
# carbons" is unreachable and the policy collapses to one safe molecule
# (benzene). carbon_atom_count has a trivial syntactic solution -- a chain of N
# carbons ("C"*N) -- so with SMALL, reachable targets + enough exploration the
# model should be able to learn to control composition.
#
# This config caps targets to small values (max_answer_numeric_value) so exact
# satisfaction is achievable. It doubles as the eval config (same filtered
# distribution) so train and eval difficulty match.
out_dir: data/miq_cg_probe_train
strategy: pooled
split: train
seed: 47
shuffle: true

tasks:
  # Easiest case: carbon count == chain length. Targets 1..8 are reachable by
  # sampling short alkanes (C, CC, CCC, ...).
  - task_id: cg_carbon_atom
    task_type: constraint_generation
    properties: [carbon_atom_count]
    constraint_operator: "="
    num_samples: 4000
    candidate_multiplier: 5
    filters:
      max_answer_numeric_value: 8

  # Harder (ring SMILES syntax), but small target counts keep it tractable.
  - task_id: cg_ring_count
    task_type: constraint_generation
    properties: [ring_count]
    constraint_operator: "="
    num_samples: 4000
    candidate_multiplier: 4
    filters:
      max_answer_numeric_value: 3
