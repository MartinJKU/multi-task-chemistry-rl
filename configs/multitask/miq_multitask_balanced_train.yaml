task_name: moleculariq
# Warm-start from the counts-pretrained checkpoint (configs/multitask/miq_curriculum_01_counts_train.yaml)
# so the model already has output-format + counting competence before tackling index/generation.
model_name: outputs/miq-curriculum-01-counts
dataset_path: data/miq_multitask_balanced_train
output_dir: outputs/miq-multitask-balanced-grpo

# Used only for legacy single-task MolecularIQ datasets. Mixed datasets dispatch
# rewards per row using their task_type column.
moleculariq_task_type: single_count

learning_rate: 1.0e-5
beta: 0.005
num_generations: 4
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
max_prompt_length: 384
max_completion_length: 384
num_train_epochs: 1
max_steps: -1
warmup_ratio: 0.1
weight_decay: 0.1
max_grad_norm: 0.1
lr_scheduler_type: cosine

seed: 42
logging_steps: 1
save_steps: 100
bf16: true
gradient_checkpointing: true
optim: adamw_8bit

use_soft_format_reward: true
correctness_weight: 2.0
use_shaped_moleculariq_reward: true
shaped_moleculariq_weight: 1.0
smiles_validity_weight: 0.5
resume_from_checkpoint:
save_on_interrupt: true
